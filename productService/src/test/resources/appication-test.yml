app:
  base-path: /digitalMarket
spring:
  datasource:
    url: jdbc:h2:mem:schema;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop   # crea tablas en memoria y las elimina al terminar
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
    open-in-view: false

  sql:
    init:
      mode: never  # ejecuta schema-disabled.sql y data.sql si existen